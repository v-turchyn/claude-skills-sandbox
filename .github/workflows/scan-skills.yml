name: Scan Claude Skills

on:
  push:
    paths: ["skills/**"]
  pull_request:
    paths: ["skills/**"]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Cisco Skill Scanner
        run: pip install cisco-ai-skill-scanner

      - name: Run skill scan
        run: |
          skill-scanner scan-all skills/ --recursive --lenient --format summary
