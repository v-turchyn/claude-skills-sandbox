# .github/workflows/scan-skills.yml
name: Scan Skills

on:
  push:
    paths: ["skills/**"]      # Run whenever files in the skills/ folder change
  pull_request:
    paths: ["skills/**"]

jobs:
  scan:
    uses: cisco-ai-defense/skill-scanner/.github/workflows/scan-skills.yml@main
    with:
      skill_path: skills       # The folder where your skill files live
    permissions:
      security-events: write   # Allows scan results to appear in GitHub's Security tab
      contents: read
