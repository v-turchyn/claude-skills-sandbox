name: Bandit Python Scan

on: [push, pull_request]

jobs:
  bandit:
    name: Bandit Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit

      - name: Extract Python code blocks from skills and scan
        run: |
          mkdir -p /tmp/bandit-blocks

          find skills/ \( -name "*.md" -o -name "*.skill" \) | while read f; do
            python3 -c "
          import re, os
          content = open('$f', encoding='utf-8', errors='ignore').read()
          blocks = re.findall(r'\`\`\`python\n(.*?)\`\`\`', content, re.DOTALL)
          base = os.path.basename('$f').replace('.', '_')
          for i, block in enumerate(blocks):
              with open(f'/tmp/bandit-blocks/{base}_{i}.py', 'w') as out:
                  out.write(block)
          "
          done

          if [ "$(ls -A /tmp/bandit-blocks 2>/dev/null)" ]; then
            echo "── Running Bandit on extracted Python blocks ──"
            bandit /tmp/bandit-blocks/*.py -ll -ii || true
          else
            echo "No Python code blocks found in skills — skipping Bandit scan."
          fi
