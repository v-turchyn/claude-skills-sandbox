name: AI Skill Security Scan
on: [push] # This tells the robot: "Run every time I upload a file"

jobs:
  snyk-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Robot grabs your code
      - name: Run Snyk Agent Scan
        uses: snyk/agent-scan@main # The Snyk scanner tool
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  cisco-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Cisco Skill Scanner
        uses: cisco-ai-defense/skill-scanner@main # The Cisco scanner tool